schema_version: 2
description: >
  Source manifest for National Merit Semifinalist observations. No numeric
  count, including an inferred zero, should enter the observation layer unless
  it is tied to a manifest entry with URL, title, date, hash, source scope,
  completeness scope, and parser provenance.

required_for_numeric_nmsf_counts:
  - source_url
  - source_title
  - source_date
  - source_hash

observation_statuses:
  - verified_count
  - verified_zero
  - missing_source
  - source_incomplete
  - ambiguous_school
  - not_operating
  - not_applicable

providers:
  - fcps
  - lcps
  - aps
  - pwcs
  - fccps
  - school_release
  - local_media
  - nmsc_virginia_list

