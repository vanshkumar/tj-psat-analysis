    provider: fcps
    source_title: 264 FCPS Students Named 2024 National Merit Semifinalists
    source_url: https://www.fcps.edu/news/264-fcps-students-named-2024-national-merit-semifinalists
    source_date: 2023-09-13
    source_hash: 7c515347de203c9607145a66c4af18a42921d73236a8be58f79863b31335468d
    source_scope: FCPS high schools
    source_completeness: Complete named FCPS list only; not complete for non-FCPS schools.
    hash_basis: Computed from data/sources/nmsf_counts.csv source metadata and transcribed counts.
