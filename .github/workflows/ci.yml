name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Regenerate seed data
        run: python scripts/build_seed_data.py

      - name: Apply source-backed NMSF counts
        run: python scripts/apply_nmsf_counts.py

      - name: Validate NMSF provenance
        run: python scripts/validate_nmsf_sources.py data/interim/panel_nmsf.csv

      - name: Run tests
        run: python -m unittest discover -s tests
